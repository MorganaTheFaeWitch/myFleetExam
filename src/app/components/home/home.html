<mat-card>
  Total Traveled: {{totalDistance}}
</mat-card>
<mat-card *ngFor="let divis of data.divisions">
  {{divis.title}} travel time: {{caculateKM(divis.title)}}
</mat-card>
<div id="page" *ngFor="let car of data.fleet">
  <mat-card>
    <mat-card-header>
      {{car.registration}}
    </mat-card-header>
    <mat-card-content>
      Total Traveled: {{car.kilometers_travelled}} <br>
      Division: {{car.division}}
    </mat-card-content>
  </mat-card>
</div>
